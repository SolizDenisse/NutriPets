  <!-- Tailwind CSS -->

  <!-- Tailwind Config para Modo Oscuro por clase -->
  <script>

      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f6fafd',
              100: '#eef5f9',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            },
            amber: {
              500: '#f59e0b',
            }
          }
        }

  <!-- Lucide Icons (para íconos modernos) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel para transpilar JSX en vivo -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: background-color 0.3s, color 0.3s;
    }
    /* Animación de hover suave */
    .recipe-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .recipe-card:hover {
      transform: translateY(-6px);
    }
    /* Estilos personalizados scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen">

  <div id="root"></div>

  <!-- Script con la aplicación completa en React -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- BASE DE DATOS INICIAL DE RECETAS VETERINARIAS SEGURAS ---
    const RECETAS_INICIALES = [
      {
        id: "receta-1",
        nombre: "Delicia de Pavo y Calabaza Otoñal",

        ],

        advertencias: [],

      },
      {
        id: "receta-2",
        nombre: "Bocados de Salmón y Patata Dulce",
        imagen: "https://images.unsplash.com/photo-1544480542-14decd21648a?auto=format&fit=crop&q=80&w=600",
        mascota: "Gato",

        ],
        preparacion: [
          "Cocina el salmón al vapor para conservar sus nutrientes y ácidos grasos esenciales. Desmenúzalo con cuidado de no dejar espinas.",
          "Cocina el camote hasta que esté blando y hazlo puré.",
          "Mezcla el salmón desmenuzado, el puré de camote y el huevo entero en un tazón hasta obtener una masa homogénea.",
          "Forma pequeñas croquetas del tamaño de un bocado felino.",
          "Hornea a 180°C durante 12-15 minutos hasta que estén ligeramente firmes.",
          "Enfría por completo antes de consentir a tu felino."
        ],
        beneficios: "Aporte masivo de Ácidos Grasos Omega-3 de alta calidad para la salud cognitiva y articular del felino.",
        advertencias: ["Revisar minuciosamente la ausencia total de espinas de salmón."],
        contienePollo: false,
        contienePescado: true,
        contieneLacteos: false,
        ingredientesRestringidos: ["Salmón", "Huevo"],
        popular: true,
        oculta: false
      },
      {
        id: "receta-3",
        nombre: "Papilla Energética de Pollo y Arroz Súper Suave",
        imagen: "https://images.unsplash.com/photo-1608454509000-193f73162e21?auto=format&fit=crop&q=80&w=600",
        mascota: "Ambos",
        edad: "Cachorro",
        tiempo: "20 min",
        dificultad: "Fácil",
        porciones: 3,
        ingredientes: [
          "250g de pechuga de pollo limpia (sin piel ni grasa)",
          "80g de arroz blanco de fácil digestión",
          "50g de calabacín (zucchini) picado finamente"
        ],
        preparacion: [
          "Cocina la pechuga de pollo en agua hirviendo sin añadir sal, ajo ni condimentos.",
          "En otra olla, cocina el arroz blanco pasándolo un poco de cocción para que sea sumamente blando y digerible.",
          "Hierve el calabacín por unos minutos.",
          "Coloca todos los ingredientes en una procesadora de alimentos o licuadora junto con un poco del caldo de cocción del pollo.",
          "Licúa hasta obtener una papilla suave. Sirve templado, ideal para cachorros en transición o mascotas convalecientes."
        ],
        beneficios: "Altamente digestible, baja en grasas y perfecta para estómagos sensibles o cachorros en desarrollo temprano.",
        advertencias: ["Nunca condimentar con cebolla o ajo."],
        contienePollo: true,
        contienePescado: false,
        contieneLacteos: false,
        ingredientesRestringidos: ["Pollo"],
        popular: false,
        oculta: false
      },
      {
        id: "receta-4",
        nombre: "Gomitas Hidratantes de Caldo de Huesos y Yogur",
        imagen: "https://images.unsplash.com/photo-1568640347023-a616a30bc3bd?auto=format&fit=crop&q=80&w=600",
        mascota: "Perro",
        edad: "Senior",
        tiempo: "15 min",
        dificultad: "Fácil",
        porciones: 12,
        ingredientes: [
          "150ml de caldo de huesos natural (sin sal ni cebolla)",
          "100g de yogur natural sin lactosa y sin azúcar añadido",
          "10g de gelatina sin sabor neutra en polvo"
        ],
        preparacion: [
          "Entibia el caldo de huesos a fuego lento.",
          "Disuelve la gelatina neutra en el caldo tibio removiendo vigorosamente para evitar grumos.",
          "Incorpora el yogur natural sin lactosa y mezcla suavemente.",
          "Vierte la preparación en moldes de silicona con formas divertidas.",
          "Refrigera por al menos 3 horas hasta que solidifiquen.",
          "Ofrece directamente del refrigerador como un premio refrescante e hidratante."
        ],
        beneficios: "Aporte natural de colágeno para las articulaciones de perros senior y excelente hidratación.",
        advertencias: ["Usar únicamente yogur sin endulzantes artificiales (el xilitol es altamente tóxico para perros)."],
        contienePollo: false,
        contienePescado: false,
        contieneLacteos: true,
        ingredientesRestringidos: ["Lácteos"],
        popular: true,
        oculta: false
      }
    ];

    // --- ALERTAS DE INGREDIENTES DAÑINOS (Sistema de Alertas Alimenticias) ---
    const INGREDIENTES_TOXICOS = [
      { nombre: "Chocolate / Cacao", peligro: "Extremo", razon: "Contiene teobromina, la cual las mascotas no pueden metabolizar, causando toxicidad cardíaca y neurológica." },
      { nombre: "Cebolla y Ajo", peligro: "Extremo", razon: "Contienen tiosulfato que destruye los glóbulos rojos de perros y gatos, produciendo anemia hemolítica." },
      { nombre: "Uvas y Pasas", peligro: "Alto", razon: "Pueden provocar insuficiencia renal aguda grave incluso en dosis muy pequeñas." },
      { nombre: "Lácteos enteros o azucarados", peligro: "Moderado", razon: "La mayoría de perros y gatos adultos carecen de lactasa para digerir la lactosa, provocando diarreas y malestar gastrointestinal." },
      { nombre: "Xilitol (Endulzante)", peligro: "Extremo", razon: "Provoca una liberación masiva e inmediata de insulina en perros, derivando en hipoglucemia severa y fallo hepático." },
      { nombre: "Aguacate / Palta", peligro: "Moderado", razon: "Contiene persina, causante de malestares estomacales y acumulación de fluidos en órganos." }
    ];

    function App() {
      // --- ESTADOS ---
      const [view, setView] = useState("home"); // home, recetas, receta-detalle, perfil, favoritos, admin
      const [darkMode, setDarkMode] = useState(false);
      const [recetas, setRecetas] = useState(() => {
        const saved = localStorage.getItem("np_recetas");
        return saved ? JSON.parse(saved) : RECETAS_INICIALES;
      });
      const [selectedRecipeId, setSelectedRecipeId] = useState(null);
      const [favoritos, setFavoritos] = useState(() => {
        const saved = localStorage.getItem("np_favoritos");
        return saved ? JSON.parse(saved) : [];
      });

      // Perfil de Mascota
      const [perfil, setPerfil] = useState(() => {
        const saved = localStorage.getItem("np_perfil");
        return saved ? JSON.parse(saved) : {
          nombre: "",
          tipo: "Perro",
          edad: "Adulto",
          tamano: "Mediano",
          alergias: "",
          ingredientesProhibidos: []
        };
      });

      // Filtros y Búsquedas
      const [searchTerm, setSearchTerm] = useState("");
      const [filterMascota, setFilterMascota] = useState("Todos");
      const [filterEdad, setFilterEdad] = useState("Todos");
      const [filterDificultad, setFilterDificultad] = useState("Todos");
      const [filterAlergenos, setFilterAlergenos] = useState({
        sinPollo: false,
        sinPescado: false,
        sinLacteos: false
      });

      // Formularios Administrador
      const [adminTab, setAdminTab] = useState("recetas"); // recetas, automatizacion, usuarios
      const [nuevaReceta, setNuevaReceta] = useState({
        nombre: "",
        imagen: "",
        mascota: "Perro",
        edad: "Adulto",
        tiempo: "20 min",
        dificultad: "Fácil",
        porciones: 2,
        ingredientes: "",
        preparacion: "",
        beneficios: "",
        advertencias: "",
        contienePollo: false,
        contienePescado: false,
        contieneLacteos: false,
        ingredientesRestringidos: "",
        popular: false
      });
      const [editingId, setEditingId] = useState(null);

      // Simulación n8n
      const [n8nLogs, setN8nLogs] = useState([]);
      const [webhookUrl, setWebhookUrl] = useState("https://n8n.tu-servidor.com/webhook/nutripets-recetas");
      const [n8nConfig, setN8nConfig] = useState({
        autoClassify: true,
        notifyAdmin: true,
        slackChannel: "#nutripets-recetas"
      });

      // --- EFECTOS ---
      // Modo Oscuro
      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      }, [darkMode]);

      // Guardado Local (LocalStorage)
      useEffect(() => {
        localStorage.setItem("np_recetas", JSON.stringify(recetas));
      }, [recetas]);

      useEffect(() => {
        localStorage.setItem("np_favoritos", JSON.stringify(favoritos));
      }, [favoritos]);

      useEffect(() => {
        localStorage.setItem("np_perfil", JSON.stringify(perfil));
      }, [perfil]);

      // Inicializar iconos de Lucide al renderizar
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      // --- FUNCIONES PERFIL ---
      const handlePerfilChange = (e) => {
        const { name, value } = e.target;
        setPerfil(prev => ({
          ...prev,
          [name]: value
        }));
      };

      const handleAlergiaToggle = (ingrediente) => {
        setPerfil(prev => {
          const list = [...prev.ingredientesProhibidos];
          if (list.includes(ingrediente)) {
            return { ...prev, ingredientesProhibidos: list.filter(i => i !== ingrediente) };
          } else {
            return { ...prev, ingredientesProhibidos: [...list, ingrediente] };
          }
        });
      };

      // --- FUNCIONES FAVORITOS ---
      const toggleFavorito = (id) => {
        if (favoritos.includes(id)) {
          setFavoritos(prev => prev.filter(item => item !== id));
        } else {
          setFavoritos(prev => [...prev, id]);
        }
      };

      // --- FILTRADO INTELIGENTE (Buscador y Recomendaciones) ---
      const recetasFiltradas = useMemo(() => {
        return recetas.filter(receta => {
          if (receta.oculta) return false;

          // Filtro por tipo de mascota
          if (filterMascota !== "Todos") {
            if (receta.mascota !== "Ambos" && receta.mascota !== filterMascota) {
              return false;
            }
          }

          // Filtro por edad de mascota
          if (filterEdad !== "Todos" && receta.edad !== filterEdad) {
            return false;
          }

          // Filtro por dificultad
          if (filterDificultad !== "Todos" && receta.dificultad !== filterDificultad) {
            return false;
          }

          // Filtro alergias/ingredientes del perfil de mascota si el usuario lo activa
          if (perfil.ingredientesProhibidos.length > 0) {
            const contieneProhibido = receta.ingredientesRestringidos.some(ri => 
              perfil.ingredientesProhibidos.includes(ri)
            );
            if (contieneProhibido) return false;
          }

          // Alertas alimenticias personalizadas por perfil (Alergias text input)
          if (perfil.alergias.trim() !== "") {
            const alergiasList = perfil.alergias.toLowerCase().split(",").map(a => a.trim());
            const contieneAlergenoText = receta.ingredientes.some(ing => 
              alergiasList.some(aler => ing.toLowerCase().includes(aler))
            );
            if (contieneAlergenoText) return false;
          }

          // Filtros directos de alérgenos (Navbar lateral)
          if (filterAlergenos.sinPollo && receta.contienePollo) return false;
          if (filterAlergenos.sinPescado && receta.contienePescado) return false;
          if (filterAlergenos.sinLacteos && receta.contieneLacteos) return false;

          // Buscador Inteligente (nombre, ingredientes, mascota, edad)
          if (searchTerm.trim() !== "") {
            const term = searchTerm.toLowerCase();
            const coincideNombre = receta.nombre.toLowerCase().includes(term);
            const coincideMascota = receta.mascota.toLowerCase().includes(term);
            const coincideEdad = receta.edad.toLowerCase().includes(term);
            const coincideIngrediente = receta.ingredientes.some(ing => ing.toLowerCase().includes(term));
            
            if (!coincideNombre && !coincideMascota && !coincideEdad && !coincideIngrediente) {
              return false;
            }
          }

          return true;
        });
      }, [recetas, filterMascota, filterEdad, filterDificultad, filterAlergenos, perfil, searchTerm]);

      // --- LOGICA DE ADMINISTRACIÓN ---
      const handleGuardarReceta = (e) => {
        e.preventDefault();
        
        const ingredientesArray = nuevaReceta.ingredientes
          .split("\n")
          .map(i => i.trim())
          .filter(i => i !== "");

        const preparacionArray = nuevaReceta.preparacion
          .split("\n")
          .map(p => p.trim())
          .filter(p => p !== "");

        const restringidosArray = nuevaReceta.ingredientesRestringidos
          .split(",")
          .map(r => r.trim())
          .filter(r => r !== "");

        if (editingId) {
          // Editar Receta Existente
          setRecetas(prev => prev.map(rec => {
            if (rec.id === editingId) {
              return {
                ...rec,
                nombre: nuevaReceta.nombre,
                imagen: nuevaReceta.imagen || "https://images.unsplash.com/photo-1544480542-14decd21648a?auto=format&fit=crop&q=80&w=600",
                mascota: nuevaReceta.mascota,
                edad: nuevaReceta.edad,
                tiempo: nuevaReceta.tiempo,
                dificultad: nuevaReceta.dificultad,
                porciones: parseInt(nuevaReceta.porciones) || 1,
                ingredientes: ingredientesArray,
                preparacion: preparacionArray,
                beneficios: nuevaReceta.beneficios,
                advertencias: nuevaReceta.advertencias ? [nuevaReceta.advertencias] : [],
                contienePollo: nuevaReceta.contienePollo,
                contienePescado: nuevaReceta.contienePescado,
                contieneLacteos: nuevaReceta.contieneLacteos,
                ingredientesRestringidos: restringidosArray
              };
            }
            return rec;
          }));
          triggerN8nAutomation("Receta Editada", nuevaReceta.nombre);
          setEditingId(null);
        } else {
          // Crear Nueva Receta
          const nueva = {
            id: `receta-${Date.now()}`,
            nombre: nuevaReceta.nombre,
            imagen: nuevaReceta.imagen || "https://images.unsplash.com/photo-1544480542-14decd21648a?auto=format&fit=crop&q=80&w=600",
            mascota: nuevaReceta.mascota,
            edad: nuevaReceta.edad,
            tiempo: nuevaReceta.tiempo,
            dificultad: nuevaReceta.dificultad,
            porciones: parseInt(nuevaReceta.porciones) || 1,
            ingredientes: ingredientesArray,
            preparacion: preparacionArray,
            beneficios: nuevaReceta.beneficios,
            advertencias: nuevaReceta.advertencias ? [nuevaReceta.advertencias] : [],
            contienePollo: nuevaReceta.contienePollo,
            contienePescado: nuevaReceta.contienePescado,
            contieneLacteos: nuevaReceta.contieneLacteos,
            ingredientesRestringidos: restringidosArray,
            popular: false,
            oculta: false
          };
          setRecetas(prev => [nueva, ...prev]);
          triggerN8nAutomation("Nueva Receta Creada", nueva.nombre);
        }

        // Limpiar Formulario
        setNuevaReceta({
          nombre: "",
          imagen: "",
          mascota: "Perro",
          edad: "Adulto",
          tiempo: "20 min",
          dificultad: "Fácil",
          porciones: 2,
          ingredientes: "",
          preparacion: "",
          beneficios: "",
          advertencias: "",
          contienePollo: false,
          contienePescado: false,
          contieneLacteos: false,
          ingredientesRestringidos: "",
          popular: false
        });
      };

      const handleEditarClick = (rec) => {
        setEditingId(rec.id);
        setNuevaReceta({
          nombre: rec.nombre,
          imagen: rec.imagen,
          mascota: rec.mascota,
          edad: rec.edad,
          tiempo: rec.tiempo,
          dificultad: rec.dificultad,
          porciones: rec.porciones,
          ingredientes: rec.ingredientes.join("\n"),
          preparacion: rec.preparacion.join("\n"),
          beneficios: rec.beneficios,
          advertencias: rec.advertencias.join(", "),
          contienePollo: rec.contienePollo || false,
          contienePescado: rec.contienePescado || false,
          contieneLacteos: rec.contieneLacteos || false,
          ingredientesRestringidos: rec.ingredientesRestringidos.join(", "),
          popular: rec.popular || false
        });
      };

      const handleToggleOcultar = (id) => {
        setRecetas(prev => prev.map(rec => {
          if (rec.id === id) {
            const updated = !rec.oculta;
            triggerN8nAutomation(updated ? "Receta Ocultada" : "Receta Visible", rec.nombre);
            return { ...rec, oculta: updated };
          }
          return rec;
        }));
      };

      const handleEliminarReceta = (id, nombre) => {
        if (confirm(`¿Estás seguro de que deseas eliminar la receta: "${nombre}"?`)) {
          setRecetas(prev => prev.filter(rec => rec.id !== id));
          triggerN8nAutomation("Receta Eliminada", nombre);
        }
      };

      // --- SIMULADOR DE AUTOMATIZACIÓN n8n ---
      const triggerN8nAutomation = (evento, detalle) => {
        const timestamp = new Date().toLocaleTimeString();
        const nuevoLog = {
          time: timestamp,
          event: evento,
          detail: detalle,
          status: "Éxito (200 OK)",
          payload: {
            app: "NutriPets-v1.2",
            timestamp: new Date().toISOString(),
            action: evento,
            recipe_name: detalle,
            webhook_endpoint: webhookUrl,
            n8n_flow: n8nConfig.autoClassify ? "Clasificación Automática Inteligente" : "Solo Registro"
          }
        };
        setN8nLogs(prev => [nuevoLog, ...prev]);
      };

      // --- COMPARTIR RECETA ---
      const [copiedId, setCopiedId] = useState(null);
      const handleCompartir = (receta) => {
        const textToCopy = `¡Mira esta deliciosa receta para tu mascota en NutriPets! 🐾\n"${receta.nombre}" (${receta.mascota} - ${receta.edad}).\nIdeal para cuidar su alimentación de manera saludable.`;
        
        // Uso de fallback obligatorio debido a restricciones de iframe
        const dummy = document.createElement("textarea");
        document.body.appendChild(dummy);
        dummy.value = textToCopy;
        dummy.select();
        document.execCommand("copy");
        document.body.removeChild(dummy);

        setCopiedId(receta.id);
        setTimeout(() => setCopiedId(null), 2000);
      };

      // Receta en detalle seleccionada
      const currentRecipe = useMemo(() => {
        return recetas.find(r => r.id === selectedRecipeId);
      }, [recetas, selectedRecipeId]);

      // Recomendación de Receta destacada en Home basada en mascota del perfil
      const recetaRecomendadaHome = useMemo(() => {
        const recomendadas = recetas.filter(r => !r.oculta && (r.mascota === perfil.tipo || r.mascota === "Ambos"));
        if (recomendadas.length > 0) {
          return recomendadas[0]; // Retorna la primera que coincida para ofrecer personalización inmediata
        }
        return recetas[0];

                          <input 
                            type="text" 
                            value={n8nConfig.slackChannel}
                            onChange={(e) => setN8nConfig(prev => ({ ...prev, slackChannel: e.target.value }))}
                            className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-xs dark:text-white"
                          />
                        </div>
                      </div>

                    </div>

                    {/* Logs de n8n en Tiempo Real */}
                    <div className="lg:col-span-7 bg-slate-950 text-emerald-400 p-6 rounded-3xl shadow-md font-mono text-xs space-y-4">
                      
                      <div className="flex items-center justify-between border-b border-slate-800 pb-3 text-slate-400">
                        <div className="flex items-center space-x-2">
                          <span className="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></span>
                          <span className="font-bold text-sm text-white">Consola de Automatización n8n [Live Logs]</span>
                        </div>
                        <button 
                          onClick={() => setN8nLogs([])}
                          className="hover:text-white font-bold text-[10px] uppercase">
                          Limpiar Logs
                        </button>
                      </div>

                      <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                        {n8nLogs.length === 0 ? (
                          <div className="text-slate-500 py-12 text-center">
                            <span>// Sin eventos ejecutados aún. Crea, edita o elimina una receta para ver la automatización de n8n en acción.</span>
                          </div>
                        ) : (
                          n8nLogs.map((log, idx) => (
                            <div key={idx} className="space-y-2 border-b border-slate-900 pb-3">
                              <div className="flex items-center justify-between">
                                <span className="text-slate-500">[{log.time}]</span>
                                <span className="text-white font-bold bg-emerald-950 px-2 py-0.5 rounded text-[10px]">{log.event}</span>
                                <span className="text-blue-400">{log.status}</span>
                              </div>
                              <p className="text-slate-300">Detalle: {log.detail}</p>
                              <pre className="bg-slate-900 p-3 rounded-xl text-[10px] text-emerald-300 overflow-x-auto max-w-full">
                                {JSON.stringify(log.payload, null, 2)}
                              </pre>
                            </div>
                          ))
                        )}
                      </div>

                    </div>

                  </div>
                )}

              </div>
            )}

          </main>

          {/* --- PIE DE PÁGINA (FOOTER) --- */}
          <footer className="bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 py-12">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-4 gap-8">
              
              <div className="space-y-4">
                <div className="flex items-center space-x-3">
                  <div className="p-2 bg-gradient-to-tr from-blue-500 to-amber-500 rounded-xl text-white">
                    🐾
                  </div>
                  <span className="text-lg font-extrabold bg-gradient-to-r from-blue-600 to-amber-500 bg-clip-text text-transparent">NutriPets</span>
                </div>
                <p className="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">
                  Plataforma clínica-nutricional interactiva para la correcta preparación de alimentos húmedos, snacks y comidas balanceadas caseras para perros y gatos.
                </p>
              </div>

              <div>
                <h5 className="font-bold text-sm text-slate-900 dark:text-white mb-4">Navegación</h5>
                <ul className="space-y-2 text-xs text-slate-500 dark:text-slate-400">
                  <li><button onClick={() => setView("home")} className="hover:text-blue-600">Inicio</button></li>
                  <li><button onClick={() => setView("recetas")} className="hover:text-blue-600">Recetas de Mascotas</button></li>
                  <li><button onClick={() => setView("perfil")} className="hover:text-blue-600">Perfil Nutricional</button></li>
                  <li><button onClick={() => setView("favoritos")} className="hover:text-blue-600">Favoritos de mi Mascota</button></li>
                </ul>
              </div>

              <div>
                <h5 className="font-bold text-sm text-slate-900 dark:text-white mb-4">Seguridad Veterinaria</h5>
                <ul className="space-y-2 text-xs text-slate-500 dark:text-slate-400">
                  <li><span className="text-red-500 font-semibold">Cebolla y Ajo: Tóxico</span></li>
                  <li><span className="text-red-500 font-semibold">Chocolate: No dar nunca</span></li>
                  <li><span className="text-red-500 font-semibold">Uvas y Pasas: Insuficiencia Renal</span></li>
                  <li><span className="text-amber-500 font-semibold">Lactosa: Evitar</span></li>
                </ul>
              </div>

              <div>
                <h5 className="font-bold text-sm text-slate-900 dark:text-white mb-4">Integraciones n8n</h5>
                <p className="text-xs text-slate-500 dark:text-slate-400 leading-relaxed mb-3">
                  Automatiza la validación, clasificación y alerta de recetas con flujos n8n directo a tu clínica.
                </p>
                <button 
                  onClick={() => { setView("admin"); setAdminTab("automatizacion"); }}
                  className="bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold text-[10px] uppercase tracking-wider px-3 py-2 rounded-lg w-full text-center">
                  Ver Consola n8n
                </button>
              </div>

            </div>

            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 pt-8 border-t border-slate-100 dark:border-slate-800 text-center text-xs text-slate-400 dark:text-slate-500">
              <p>© 2026 NutriPets. Desarrollado con rigurosos criterios veterinarios de balance dietético animal.</p>
            </div>
          </footer>

        </div>
      );
    }

    // Renderizado de la aplicación
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
